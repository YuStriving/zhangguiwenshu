tables:
  - name: dim_region
    role: dim
    description: 地区维度表，用于描述订单发生的地理区域信息。
    columns:
      - name: region_id
        role: primary_key
        description: 地区唯一标识。
        alias: [地区ID, 区域ID]
        sync: false

      - name: province
        role: dimension
        description: 订单所属的省份名称。
        alias: [省份, 省, 所在省份]
        sync: true

      - name: region_name
        role: dimension
        description: 订单所属的大区名称，如华东、华南等。
        alias: [地区, 区域, 大区]
        sync: true

      - name: country
        role: dimension
        description: 地区所属国家名称。
        alias: [国家, 国家名称]
        sync: true

  - name: dim_customer
    role: dim
    description: 客户维度表，描述下单客户的基本属性。
    columns:
      - name: customer_id
        role: primary_key
        description: 客户唯一标识。
        alias: [客户ID, 用户ID]
        sync: false

      - name: customer_name
        role: dimension
        description: 客户名称。
        alias: [客户名称, 用户名称]
        sync: true

      - name: gender
        role: dimension
        description: 客户性别。
        alias: [性别]
        sync: true

      - name: member_level
        role: dimension
        description: 客户会员等级。
        alias: [会员等级, 等级]
        sync: true

  - name: dim_product
    role: dim
    description: 商品维度表，描述商品的基本属性。
    columns:
      - name: product_id
        role: primary_key
        description: 商品唯一标识。
        alias: [商品ID, 产品ID]
        sync: false

      - name: product_name
        role: dimension
        description: 商品名称。
        alias: [商品名称, 产品名称]
        sync: true

      - name: category
        role: dimension
        description: 商品分类。
        alias: [分类, 品类]
        sync: true

      - name: brand
        role: dimension
        description: 商品品牌。
        alias: [品牌]
        sync: true

  - name: dim_date
    role: dim
    description: 时间维度表，用于时间相关的分析。
    columns:
      - name: date_id
        role: primary_key
        description: 日期唯一标识。
        alias: [日期ID]
        sync: false

      - name: year
        role: dimension
        description: 年份。
        alias: [年]
        sync: true

      - name: quarter
        role: dimension
        description: 季度。
        alias: [季度]
        sync: true

      - name: month
        role: dimension
        description: 月份。
        alias: [月]
        sync: true

      - name: day
        role: dimension
        description: 日期。
        alias: [日]
        sync: true

  - name: fact_order
    role: fact
    description: 订单事实表，记录订单数量和金额等核心指标。
    columns:
      - name: order_id
        role: primary_key
        description: 订单唯一标识。
        alias: [订单ID]
        sync: false

      - name: customer_id
        role: foreign_key
        description: 关联客户维度的外键。
        alias: [客户ID, 用户ID]
        sync: false

      - name: product_id
        role: foreign_key
        description: 关联商品维度的外键。
        alias: [商品ID, 产品ID]
        sync: false

      - name: date_id
        role: foreign_key
        description: 关联时间维度的外键。
        alias: [日期, 下单日期]
        sync: false

      - name: region_id
        role: foreign_key
        description: 关联地区维度的外键。
        alias: [地区ID, 区域ID]
        sync: false

      - name: order_quantity
        role: measure
        description: 订单中商品的购买数量。
        alias: [销量, 购买数量, 件数]
        sync: false

      - name: order_amount
        role: measure
        description: 订单金额。
        alias: [金额, 订单金额, 销售金额]
        sync: false

metrics:
  - name: GMV
    description: 总交易额，统计所有订单的销售总额。
    relevant_columns: [order_amount]
    alias: [总交易额, 销售额]

  - name: AOV
    description: 平均订单价值，计算每个订单的平均金额。
    relevant_columns: [order_amount, order_quantity]
    alias: [客单价, 平均订单价值]